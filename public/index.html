<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disinformation Combat Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Disinformation Combat Simulator</h1>
        
        <div class="row mb-5">
            <!-- Red Team Section -->
            <div class="col-md-6">
                <h2 class="text-danger">Red Team Tools</h2>
                <p>Create and deploy disinformation strategies to influence public opinion.</p>
                <button class="btn btn-danger w-100 mb-3" onclick="generateDisinformation()">Generate Disinformation</button>
            </div>

            <!-- Blue Team Section -->
            <div class="col-md-6">
                <h2 class="text-success">Blue Team Tools</h2>
                <p>Detect and counter disinformation campaigns to restore public trust.</p>
                <button class="btn btn-success w-100 mb-3" onclick="generateCounterNarrative()">Generate Counter-Narrative</button>
            </div>
        </div>

        <!-- Game Log -->
        <div>
            <h2 class="text-center">Game Log</h2>
            <ul id="actions-list" class="list-group"></ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
